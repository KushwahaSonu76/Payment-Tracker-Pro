name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true

      - name: Install Stellar CLI
        run: |
          curl -sSOL https://github.com/stellar/stellar-cli/releases/download/v22.0.1/stellar-cli-22.0.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xvf stellar-cli-22.0.1-x86_64-unknown-linux-gnu.tar.gz
          sudo mv stellar /usr/local/bin/stellar

      - name: Build Contracts
        run: |
          cd contracts
          cargo build --target wasm32-unknown-unknown --release
          stellar contract build

      - name: Test Contracts
        run: |
          cd contracts
          cargo test > ../test_log.txt 2>&1 || touch ../test_failed
          cat ../test_log.txt

      - name: Commit and Push Test Logs
        if: always()
        run: |
          if [ -f test_log.txt ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add test_log.txt
            git commit -m "chore: add test failure logs from CI [skip ci]" && git push || true
          fi

      - name: Check Test Result
        run: |
          if [ -f test_failed ]; then
            echo "Rust tests failed!"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts > npm_log.txt 2>&1 || touch npm_failed
          cat npm_log.txt

      - name: Commit and Push NPM Logs
        if: always()
        run: |
          if [ -f npm_log.txt ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add npm_log.txt
            git commit -m "chore: add npm build logs from CI [skip ci]" && git push || true
          fi

      - name: Check NPM Result
        run: |
          if [ -f npm_failed ]; then
            echo "NPM install failed!"
            exit 1
          fi

      - name: Lint and Type Check
        run: |
          npm run lint
          npx tsc --noEmit

      - name: Test Frontend
        run: npm test
