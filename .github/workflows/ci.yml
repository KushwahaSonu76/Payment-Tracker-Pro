name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true

      - name: Install Stellar CLI
        run: |
          curl -sSOL https://github.com/stellar/stellar-cli/releases/download/v22.0.1/stellar-cli-22.0.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xvf stellar-cli-22.0.1-x86_64-unknown-linux-gnu.tar.gz
          sudo mv stellar /usr/local/bin/stellar

      - name: Build Contracts
        run: |
          cd contracts
          cargo build --target wasm32-unknown-unknown --release
          stellar contract build

      - name: Test Contracts
        run: |
          cd contracts
          find target -name "*.wasm" || true
          cargo test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint and Type Check
        run: |
          npm run lint
          npx tsc --noEmit

      - name: Test Frontend
        run: npm test
